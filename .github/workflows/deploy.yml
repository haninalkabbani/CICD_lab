name: Deploy to Production

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: Checkout repo
uses: actions/checkout@v4

```
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Fabric CICD package
    run: pip install fabric-cicd

  - name: Deploy to Fabric Production
    run: |
      fabric-cicd deploy
      --source-workspace "Fabric_lab_1_Dev"
      --target-workspace "Fabric_lab_1_Prd"
      --tenant-id "${{ secrets.TENANT_ID }}"
      --client-id "${{ secrets.CLIENT_ID }}"
      --client-secret "${{ secrets.CLIENT_SECRET }}"
```
